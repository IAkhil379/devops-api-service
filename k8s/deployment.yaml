apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-api-deployment
  labels:
    app: devops-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-api
  template:
    metadata:
      labels:
        app: devops-api
    spec:
      containers:
      - name: devops-api
        image: devops-api:latest
        ports:
        - containerPort: 5000
